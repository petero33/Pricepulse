# render.yaml — PricePulse Kenya Render deployment config
# https://render.com/docs/render-yaml

services:
  # ─── NestJS API ─────────────────────────────────────────────────────────────
  - type: web
    name: pricepulse-api
    runtime: node
    region: frankfurt  # closest to Kenya (no Nairobi region yet)
    plan: starter      # $7/month — upgrade to standard when needed
    rootDir: apps/api
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pricepulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pricepulse-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # Africa's Talking
      - key: AT_API_KEY
        sync: false   # set manually in Render dashboard
      - key: AT_USERNAME
        sync: false
      # Firebase (Storage)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # Elasticsearch (Bonsai free tier or self-hosted)
      - key: ELASTICSEARCH_NODE
        sync: false
      # FCM (Firebase Cloud Messaging for push notifications)
      - key: FCM_SERVER_KEY
        sync: false
      # Mapbox (for store map tiles - free tier)
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── Background Worker (BullMQ) ──────────────────────────────────────────────
  - type: worker
    name: pricepulse-worker
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: apps/api
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/src/worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pricepulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pricepulse-redis
          type: redis
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FCM_SERVER_KEY
        sync: false

databases:
  - name: pricepulse-db
    databaseName: pricepulse
    user: pricepulse
    plan: starter     # 256MB RAM, 1GB storage — free on Render
    region: frankfurt
    postgresMajorVersion: 16

  - name: pricepulse-redis
    plan: starter
    region: frankfurt
    ipAllowList: []   # accessible only within Render private network
